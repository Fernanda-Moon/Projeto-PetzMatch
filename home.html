<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetzMatch | Home</title>
    <link rel="icon" type="image/png" href="img/petzmatch.logo.jpeg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header com localização e ícones -->
        <header class="main-header">
            <div class="header-left">
                <span class="material-icons">location_on</span>
                <span class="location-text">Campina Grande, PB</span>
            </div>
            <div class="header-right">
                <span class="material-icons">search</span>
                <span class="material-icons">notifications_none</span>
            </div>
        </header>

        <main class="main-content">
            <!-- Carrossel Bootstrap -->
            <div id="petCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#petCarousel" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#petCarousel" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#petCarousel" data-bs-slide-to="2"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="img/petzmatch.logo.jpeg" class="d-block w-100" alt="Cães">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#petCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#petCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>

            <!-- Categorias -->
            <section class="categories-section">
                <h3 class="section-title">Categorias</h3>
                <div class="categories-grid">
                    <a href="categoria-cat.html" class="category-card">
                        <img src="img/gato2.png.png" alt="Gatos" class="category-icon">
                        <span>Felinos</span>
                    </a>
                    <a href="categoria-dog.html" class="category-card">
                        <img src="img/pata.png.png" alt="Cães" class="category-icon">
                        <span>Cães</span>
                    </a>
                    <a href="categoria-bird.html" class="category-card">
                        <img src="img/passaro2.png.png" alt="Pássaros" class="category-icon">
                        <span>Pássaros</span>
                    </a>
                    <a href="categoria-rat.html" class="category-card">
                        <img src="img/coelho2.png.png" alt="Roedores" class="category-icon">
                        <span>Roedores</span>
                    </a>
                    <a href="categoria-fish.html" class="category-card">
                        <img src="img/peixe.png.png" alt="Peixes" class="category-icon">
                        <span>Peixes</span>
                    </a>
                    <a href="categoria-reptil.html" class="category-card">
                        <img src="img/cobra2.png.png" alt="Répteis" class="category-icon">
                        <span>Répteis</span>
                    </a>
                </div>
            </section>

            <section class="pets-section">
                <h3 class="section-title">Pets próximos</h3>
                <div class="row g-3" id="featuredPetsContainer">
                    <!-- Cards estão inseridos pelo JS -->
                </div>
            </section>

        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="home.html" class="nav-item active">
                <span class="material-icons">home</span>
                <span>Início</span>
            </a>
            <a href="explorar.html" class="nav-item">
                <span class="material-icons">favorite</span>
                <span>Explorar</span>
            </a>
            <a href="chat.html" class="nav-item">
                <span class="material-icons">chat_bubble</span>
                <span>Chat</span>
            </a>
            <a href="perfil.html" class="nav-item">
                <span class="material-icons">person</span>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Carrega pets em destaque ao iniciar (proximidade)
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof carregarPetsDestaque === 'function') {
                carregarPetsDestaque();
            }
        });
    </script>
</body>
</html>
