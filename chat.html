<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | PetzMatch</title>
    <link rel="icon" type="image/png" href="img/petzmatch.logo.jpeg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="mobile-header">
            <div class="header-content">
                <h1 class="logo">Conversas</h1>
                <span class="material-icons">more_vert</span>
            </div>
        </header>

        <main class="main-content chat-list">
            <div class="chat-item">
                <img src="img/aliceAvatar.png.jpg" alt="Avatar">
                <div class="chat-info">
                    <h4>Alice Armstrong (Tutora de Amora)</h4>
                    <p>Olá! Tenho interesse no cruzamento...</p>
                </div>
                <span class="chat-time">12:30</span>
            </div>
            <div class="chat-item">
                <img src="img/lucasAvatar.png.jpg" alt="Avatar">
                <div class="chat-info">
                    <h4>Lucas Kaliel (Tutor de Bluy)</h4>
                    <p>Claro, podemos marcar uma visita!</p>
                </div>
                <span class="chat-time">Ontem</span>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="home.html" class="nav-item"><span class="material-icons">home</span><span>Início</span></a>
            <a href="explorar.html" class="nav-item"><span class="material-icons">favorite</span><span>Explorar</span></a>
            <a href="chat.html" class="nav-item active"><span class="material-icons">chat_bubble</span><span>Chat</span></a>
            <a href="perfil.html" class="nav-item"><span class="material-icons">person</span><span>Perfil</span></a>
        </nav>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
